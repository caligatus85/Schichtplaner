<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Schichtplaner">
<title>Schichtplaner JVA</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f1117;--bg2:#171b26;--bg3:#1e2333;--border:#2a3040;
  --accent:#4a9eff;--green:#2dce89;--yellow:#ffc107;--red:#f44336;
  --text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow-x:hidden;}

.topbar{position:sticky;top:0;z-index:100;background:rgba(15,17,23,0.97);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}
.topbar-date{font-family:var(--mono);font-size:11px;color:var(--text2);}

.bottom-nav{position:sticky;bottom:0;z-index:100;background:rgba(15,17,23,0.97);border-top:1px solid var(--border);display:flex;}
.nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;color:var(--text3);font-family:var(--sans);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:color .2s;}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{width:20px;height:20px;}

.view{display:none;padding:16px;}
.view.active{display:block;}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.cal-month{font-family:var(--mono);font-size:16px;font-weight:600;}
.cal-nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* Quick-action bar */
.quick-bar{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 10px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.quick-bar-label{font-family:var(--mono);font-size:10px;color:var(--text3);flex-shrink:0;}
.quick-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s;flex-shrink:0;}
.quick-chip:active{opacity:.7;}
.quick-chip-dot{width:8px;height:8px;border-radius:50%;}
.quick-bar-hint{font-size:10px;color:var(--text3);margin-left:auto;}

.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
.cal-wd{text-align:center;font-family:var(--mono);font-size:10px;color:var(--text3);padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;border:1px solid transparent;transition:border-color .15s;user-select:none;}
.cal-day.empty{background:none;cursor:default;}
.cal-day.today{border-color:var(--accent)!important;}
.cal-day-num{font-family:var(--mono);font-size:11px;font-weight:500;z-index:1;line-height:1;}
.cal-day-label{font-size:7px;font-weight:600;letter-spacing:.03em;z-index:1;margin-top:2px;text-transform:uppercase;}
.cal-day-bg{position:absolute;inset:0;}
.cal-day.no-shift{background:var(--bg2);}
.cal-day.no-shift .cal-day-num{color:var(--text2);}

/* MODALS */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.78);display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:16px 16px 24px;animation:slideUp .22s ease;max-height:88vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px;}
.modal-title{font-family:var(--mono);font-size:13px;color:var(--accent);margin-bottom:10px;}

/* SHIFT PICKER – compact */
.shift-group-label{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:8px 0 4px;grid-column:1/-1;}
.shift-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px;}
.shift-option{padding:7px 6px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:all .12s;text-align:center;}
.shift-option.selected{border-color:var(--sc,var(--accent));background:rgba(74,158,255,.12);}
.shift-option-kuerzel{font-family:var(--mono);font-size:12px;font-weight:700;margin-bottom:2px;}
.shift-option-time{font-size:8px;color:var(--text2);}

/* Time override – collapsible */
.override-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2);cursor:pointer;margin-bottom:8px;user-select:none;}
.override-toggle svg{width:14px;height:14px;transition:transform .2s;}
.override-toggle.open svg{transform:rotate(180deg);}
.time-override-section{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;margin-bottom:10px;display:none;}
.time-override-section.open{display:block;}
.time-override-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;}
.time-override-label{font-size:11px;color:var(--text2);width:48px;flex-shrink:0;}
.time-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:13px;padding:6px 8px;}
.time-input:focus{outline:none;border-color:var(--accent);}

.note-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 10px;margin-bottom:10px;resize:none;height:46px;}
.note-input:focus{outline:none;border-color:var(--accent);}

.btn-row{display:flex;gap:6px;}
.btn{flex:1;padding:11px;border-radius:10px;border:none;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s;}
.btn:active{opacity:.75;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-danger{background:rgba(244,67,54,.15);color:var(--red);border:1px solid rgba(244,67,54,.3);}

/* VORLAGEN */
.section-title{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:7px;cursor:grab;}
.card.dragging{opacity:.35;}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.card-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px;flex:1;min-width:0;}
.drag-handle{color:var(--text3);font-size:16px;cursor:grab;padding:0 3px;touch-action:none;flex-shrink:0;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.card-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.card-meta{font-family:var(--mono);font-size:10px;color:var(--text2);}
.icon-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;flex-shrink:0;margin-left:6px;}
.badge{display:inline-block;padding:2px 6px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;flex-shrink:0;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;}
.stat-val{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--accent);}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px;}

.export-btn{width:100%;padding:12px;background:var(--bg2);border:1px solid var(--accent);border-radius:12px;color:var(--accent);font-family:var(--mono);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:background .15s;}
.export-btn:active{background:rgba(74,158,255,.1);}
.export-btn.green{border-color:var(--green);color:var(--green);}
.export-btn.green:active{background:rgba(45,206,137,.1);}
.export-btn.orange{border-color:#e05000;color:#e05000;}

.month-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.month-row-date{font-family:var(--mono);font-size:11px;color:var(--text2);}
.month-row-shift{font-size:12px;font-weight:500;}
.month-row-hours{font-family:var(--mono);font-size:11px;color:var(--text2);}

/* FORMS */
.form-group{margin-bottom:10px;}
.form-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;font-family:var(--mono);}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 10px;}
.form-input:focus{outline:none;border-color:var(--accent);}
.color-row{display:flex;gap:6px;flex-wrap:wrap;}
.color-swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
.color-swatch.selected{border-color:white;}

/* EXPORT TEXT */
#exportArea{display:none;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--text2);white-space:pre;overflow-x:auto;line-height:1.6;}
.copy-btn{width:100%;padding:9px;background:var(--bg3);border:1px solid var(--green);border-radius:10px;color:var(--green);font-family:var(--mono);font-size:11px;cursor:pointer;margin-top:6px;display:none;}

/* BACKUP */
.backup-section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;}
.backup-title{font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:10px;}

.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--text);z-index:300;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">⬛ Schichtplaner</div>
  <div class="topbar-date" id="topbarDate"></div>
</div>

<div class="content">
  <!-- KALENDER -->
  <div class="view active" id="view-cal">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="calMonthLabel"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <!-- Last shift indicator -->
    <div class="quick-bar" id="quickBar">
      <span class="quick-bar-label">Zuletzt:</span>
      <div class="quick-chip" id="quickChip" style="cursor:default">
        <span class="quick-chip-dot" id="quickDot"></span>
        <span id="quickLabel">–</span>
      </div>
      <span class="quick-bar-hint">Tippen = Modal mit Vorauswahl</span>
    </div>
    <div class="cal-weekdays">
      <div class="cal-wd">Mo</div><div class="cal-wd">Di</div><div class="cal-wd">Mi</div>
      <div class="cal-wd">Do</div><div class="cal-wd">Fr</div>
      <div class="cal-wd" style="color:#ff6b35">Sa</div>
      <div class="cal-wd" style="color:#f44336">So</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- VORLAGEN -->
  <div class="view" id="view-vorlagen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="section-title" style="margin-bottom:0">Schichtvorlagen</div>
      <button id="sortToggleBtn" onclick="toggleSortMode()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:5px 10px;font-size:11px;font-family:var(--mono);cursor:pointer">⇅ Sortieren</button>
    </div>
    <div id="vorlagenList"></div>
    <button class="export-btn green" onclick="openNewVorlage()" style="margin-top:4px">
      <span>+</span> Neue Vorlage anlegen
    </button>
    <button class="export-btn orange" onclick="resetVorlagen()" style="margin-top:4px">
      🔄 Standard-Vorlagen wiederherstellen
    </button>
  </div>

  <!-- AUSWERTUNG -->
  <div class="view" id="view-stats">
    <div class="cal-header" style="margin-bottom:10px">
      <button class="cal-nav-btn" onclick="changeStatsMonth(-1)">‹</button>
      <div class="cal-month" id="statsMonthLabel"></div>
      <button class="cal-nav-btn" onclick="changeStatsMonth(1)">›</button>
    </div>
    <div class="stats-grid" id="statsGrid"></div>

    <div class="section-title">Export &amp; Backup</div>
    <button class="export-btn" onclick="exportMonth()">📄 Monatsübersicht anzeigen</button>
    <div id="exportArea"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyExport()">📋 Text kopieren</button>
    <button class="export-btn" onclick="emailExport()" style="margin-top:6px">✉️ Per E-Mail senden</button>

    <div class="backup-section" style="margin-top:10px">
      <div class="backup-title">🔒 Datensicherung (alle Monate)</div>
      <button class="export-btn green" onclick="backupExport()" style="margin-bottom:8px">⬇️ Backup exportieren</button>
      <button class="export-btn orange" onclick="document.getElementById('backupImport').click()">⬆️ Backup wiederherstellen</button>
      <input type="file" id="backupImport" accept=".json" style="display:none" onchange="backupImport(event)">
    </div>

    <div class="section-title" style="margin-top:10px">Schichten im Monat</div>
    <div id="monthList"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showView('cal',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Kalender
  </button>
  <button class="nav-btn" onclick="showView('vorlagen',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Vorlagen
  </button>
  <button class="nav-btn" onclick="showView('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Auswertung
  </button>
</div>

<!-- MODAL: Tag bearbeiten -->
<div class="modal-overlay" id="dayModal" onclick="closeDayModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="dayModalTitle">Tag bearbeiten</div>
    <div class="shift-picker" id="shiftPicker"></div>
    <div class="override-toggle" id="overrideToggle" onclick="toggleOverride()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      <span>Zeiten anpassen</span>
    </div>
    <div class="time-override-section" id="timeOverrideSection">
      <div class="time-override-row">
        <span class="time-override-label">Beginn</span>
        <input class="time-input" type="time" id="overrideStart">
      </div>
      <div class="time-override-row">
        <span class="time-override-label">Ende</span>
        <input class="time-input" type="time" id="overrideEnd">
      </div>
      <div class="time-override-row">
        <span class="time-override-label">Pause</span>
        <input class="time-input" type="number" id="overridePause" min="0" max="120" placeholder="Min.">
      </div>
    </div>
    <textarea class="note-input" id="dayNote" placeholder="Notiz (optional)…"></textarea>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="clearDay()">✕</button>
      <button class="btn btn-secondary" onclick="closeDayModal()">Abbruch</button>
      <button class="btn btn-primary" onclick="saveDay()">Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL: Vorlage bearbeiten -->
<div class="modal-overlay" id="vorlageModal" onclick="closeVorlageModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="vorlageModalTitle">Vorlage bearbeiten</div>
    <div class="form-group">
      <label class="form-label">Bezeichnung</label>
      <input class="form-input" id="vName" placeholder="z.B. Frühdienst F1">
    </div>
    <div class="form-group">
      <label class="form-label">Kürzel (max 4 Zeichen)</label>
      <input class="form-input" id="vKuerzel" placeholder="z.B. F1" maxlength="4">
    </div>
    <div class="form-group">
      <label class="form-label">Beginn (leer = variabel)</label>
      <input class="form-input" type="time" id="vStart">
    </div>
    <div class="form-group">
      <label class="form-label">Ende (leer = variabel)</label>
      <input class="form-input" type="time" id="vEnd">
    </div>
    <div class="form-group">
      <label class="form-label">Pause (Minuten)</label>
      <input class="form-input" type="number" id="vPause" placeholder="0" min="0" max="120">
    </div>
    <div class="form-group">
      <label class="form-label">Farbe</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="btn-row" style="margin-top:6px">
      <button class="btn btn-danger" id="deleteVorlageBtn" onclick="deleteVorlage()">Löschen</button>
      <button class="btn btn-secondary" onclick="closeVorlageModal()">Abbruch</button>
      <button class="btn btn-primary" onclick="saveVorlage()">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── COLORS ──
const C={
  frueh:'#fa8072', spaet:'#4a9eff', nacht:'#2dce89',
  frei:'#ffc107', lehr:'#6b7280', plan:'#e05000',
  braun:'#a0522d', oliv:'#6b8e23'
};
const COLORS=[
  C.frueh,'#e8604a',         // Lachsrot
  C.spaet,'#2266cc',         // Blau
  C.nacht,'#1aaa6a',         // Grün
  C.oliv,'#4a7a1e',          // Olivgrün
  C.frei,'#e6a800',          // Gelb
  C.plan,'#c24000',          // Orange
  C.braun,'#7a3520',         // Braun
  C.lehr,'#9ca3af',          // Grau
  '#9c6bff','#6a3fbf',       // Lila
  '#e91e63','#b0003a',       // Pink
  '#00bcd4','#007a8a',       // Cyan
  '#8bc34a','#5a8a20',       // Hellgrün
];

const MONTHS=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

const DEFAULT_VORLAGEN=[
  // Frühdienste
  {id:'F1', name:'Frühdienst F1',           kuerzel:'F1',  start:'05:50',end:'14:20',pause:30, color:C.frueh},
  {id:'F2', name:'Frühdienst F2',           kuerzel:'F2',  start:'05:50',end:'14:20',pause:30, color:C.frueh},
  {id:'F3', name:'Frühdienst F3',           kuerzel:'F3',  start:'05:50',end:'14:20',pause:30, color:C.frueh},
  {id:'FZ', name:'Frühdienst Zentrale',     kuerzel:'FZ',  start:'05:50',end:'14:20',pause:30, color:C.frueh},
  // Spätdienste
  {id:'S1', name:'Spätdienst S1',           kuerzel:'S1',  start:'14:10',end:'22:10',pause:0,  color:C.spaet},
  {id:'S2', name:'Spätdienst S2',           kuerzel:'S2',  start:'14:10',end:'22:10',pause:0,  color:C.spaet},
  {id:'S3', name:'Spätdienst S3',           kuerzel:'S3',  start:'14:10',end:'22:10',pause:0,  color:C.spaet},
  {id:'SZ', name:'Spätdienst Zentrale',     kuerzel:'SZ',  start:'14:10',end:'22:10',pause:0,  color:C.spaet},
  // Nachtdienste

// ── STORAGE ──
function lsGet(k){try{return localStorage.getItem(k);}catch(e){return _mem[k]||null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){_mem[k]=v;}}
const _mem={};

function loadVorlagen(){const r=lsGet('sp_vorlagen');return r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT_VORLAGEN));}
function saveVorlagenData(v){lsSet('sp_vorlagen',JSON.stringify(v));}
function loadShifts(){const r=lsGet('sp_shifts');return r?JSON.parse(r):{};}
function saveShifts(s){lsSet('sp_shifts',JSON.stringify(s));}
function loadLastShift(){const r=lsGet('sp_last');return r?JSON.parse(r):null;}
function saveLastShift(v){lsSet('sp_last',JSON.stringify(v));}

let vorlagen=loadVorlagen();
let shifts=loadShifts();
let lastShift=loadLastShift();

const TODAY=new Date();TODAY.setHours(0,0,0,0);
let calYear=TODAY.getFullYear(),calMonth=TODAY.getMonth();
let statsYear=calYear,statsMonth=calMonth;

function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

// ── QUICK BAR ──
function updateQuickBar(){
  const v=lastShift?vorlagen.find(x=>x.id===lastShift.id):null;
  if(v){
    document.getElementById('quickDot').style.background=v.color;
    document.getElementById('quickLabel').textContent=v.kuerzel;
    document.getElementById('quickChip').style.borderColor=v.color;
  } else {
    document.getElementById('quickDot').style.background='var(--text3)';
    document.getElementById('quickLabel').textContent='–';
    document.getElementById('quickChip').style.borderColor='var(--border)';
  }
}

function quickApply(){
  if(!lastShift||!quickTargetKey) return;
  const v=vorlagen.find(x=>x.id===lastShift.id);
  if(!v) return;
  shifts[quickTargetKey]={vorlageId:v.id,note:''};
  saveShifts(shifts);
  renderCalendar();
  renderStats();
  showToast(`${v.kuerzel} eingetragen ✓`);
}

let quickTargetKey=null;
let longPressTimer=null;

function handleDayTouchStart(e,key,d){
  quickTargetKey=key;
  longPressTimer=setTimeout(()=>{
    longPressTimer=null;
    openDayModal(key,d);
  },500);
}
function handleDayTouchEnd(e,key,d){
  if(longPressTimer){
    clearTimeout(longPressTimer);
    longPressTimer=null;
    openDayModal(key,d);
  }
}
function handleDayClick(key,d){
  openDayModal(key,d);
}

// ── CALENDAR ──
function renderCalendar(){
  document.getElementById('calMonthLabel').textContent=`${MONTHS[calMonth]} ${calYear}`;
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const first=new Date(calYear,calMonth,1);
  let sd=first.getDay();sd=sd===0?6:sd-1;
  const dim=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<sd;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const key=dateKey(calYear,calMonth,d);
    const sh=shifts[key];
    const v=sh?vorlagen.find(x=>x.id===sh.vorlageId):null;
    const isToday=new Date(calYear,calMonth,d).getTime()===TODAY.getTime();
    const cell=document.createElement('div');
    cell.className='cal-day'+(v?'':' no-shift')+(isToday?' today':'');
    const hasCustom=sh&&(sh.customStart||sh.customEnd);
    if(v){
      cell.innerHTML=`<div class="cal-day-bg" style="background:${v.color};opacity:0.22"></div>
        <div class="cal-day-num" style="color:${v.color}">${d}</div>
        <div class="cal-day-label" style="color:${v.color}">${v.kuerzel}${hasCustom?'*':''}</div>`;
    } else {
      cell.innerHTML=`<div class="cal-day-num">${d}</div><div class="cal-day-label">${sh&&sh.note?'·':''}</div>`;
    }
    // Touch: long press = modal, short tap = quick
    cell.addEventListener('touchstart',e=>handleDayTouchStart(e,key,d),{passive:true});
    cell.addEventListener('touchend',e=>handleDayTouchEnd(e,key,d));
    cell.addEventListener('touchmove',()=>{if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;}},{passive:true});
    // Mouse fallback
    cell.addEventListener('click',()=>handleDayClick(key,d));
    grid.appendChild(cell);
  }
  updateQuickBar();
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

// ── DAY MODAL ──
let editingKey=null;

const GROUPS=[
  {label:'Frühdienste',       ids:['F1','F2','F3','FZ']},
  {label:'Spätdienste',       ids:['S1','S2','S3','SZ']},
  {label:'Nachtdienste',      ids:['N1','N2','NZ','N1W','N2W','NZW','NW']},
  {label:'WE/Feiertag – Tag', ids:['F1W','F2W','FZW','TW']},
  {label:'Besuch/Küche/zbV',  ids:['HB','HBF','KÜW','KÜ','KÜF','zbV','zbVF']},
  {label:'KH-Überwachung',    ids:['KHF','KHS','KHN']},
  {label:'Sonstiges',         ids:['RDL1','RDL2','Lehr','URL','DF','UFP','NDP','DVP']},
];
const ALL_GROUP_IDS=GROUPS.flatMap(g=>g.ids);

function openDayModal(key,d){
  editingKey=key;
  const dow=new Date(calYear,calMonth,d).getDay();
  const dn=['So','Mo','Di','Mi','Do','Fr','Sa'];
  document.getElementById('dayModalTitle').textContent=`${dn[dow]}, ${d}. ${MONTHS[calMonth]} ${calYear}`;
  const ex=shifts[key];
  document.getElementById('dayNote').value=ex?(ex.note||''):'';
  document.getElementById('overrideStart').value=ex&&ex.customStart?ex.customStart:'';
  document.getElementById('overrideEnd').value=ex&&ex.customEnd?ex.customEnd:'';
  document.getElementById('overridePause').value=ex&&ex.customPause!=null?ex.customPause:'';
  // Reset override toggle
  document.getElementById('timeOverrideSection').classList.remove('open');
  document.getElementById('overrideToggle').classList.remove('open');

  const picker=document.getElementById('shiftPicker');picker.innerHTML='';

  GROUPS.forEach(g=>{
    const inGroup=vorlagen.filter(v=>g.ids.includes(v.id));
    if(!inGroup.length) return;
    const lbl=document.createElement('div');lbl.className='shift-group-label';lbl.textContent=g.label;
    picker.appendChild(lbl);
    inGroup.forEach(v=>picker.appendChild(makeShiftOption(v,ex)));
  });
  // Custom vorlagen not in any group
  const extras=vorlagen.filter(v=>!ALL_GROUP_IDS.includes(v.id));
  if(extras.length){
    const lbl=document.createElement('div');lbl.className='shift-group-label';lbl.textContent='Eigene Vorlagen';
    picker.appendChild(lbl);
    extras.forEach(v=>picker.appendChild(makeShiftOption(v,ex)));
  }

  if(ex&&ex.vorlageId){
    const v=vorlagen.find(x=>x.id===ex.vorlageId);
    if(v){
      if(!ex.customStart&&v.start) document.getElementById('overrideStart').value=v.start;
      if(!ex.customEnd&&v.end) document.getElementById('overrideEnd').value=v.end;
      if(ex.customPause==null) document.getElementById('overridePause').value=v.pause||0;
    }
  }
  document.getElementById('dayModal').classList.add('open');
}

function makeShiftOption(v,ex){
  const opt=document.createElement('div');
  opt.className='shift-option'+(ex&&ex.vorlageId===v.id?' selected':'');
  opt.style.setProperty('--sc',v.color);
  const timeStr=v.start&&v.end?`${v.start}-${v.end}`:'variabel';
  opt.innerHTML=`<div class="shift-option-kuerzel" style="color:${v.color}">${v.kuerzel}</div>
    <div class="shift-option-time">${timeStr}</div>`;
  opt.title=v.name;
  opt.onclick=()=>{
    const was=opt.classList.contains('selected');
    document.querySelectorAll('#shiftPicker .shift-option').forEach(o=>o.classList.remove('selected'));
    if(!was){
      opt.classList.add('selected');
      if(v.start) document.getElementById('overrideStart').value=v.start;
      if(v.end) document.getElementById('overrideEnd').value=v.end;
      document.getElementById('overridePause').value=v.pause||0;
    }
  };
  return opt;
}

function toggleOverride(){
  document.getElementById('timeOverrideSection').classList.toggle('open');
  document.getElementById('overrideToggle').classList.toggle('open');
}

function closeDayModal(e){
  if(!e||e.target===document.getElementById('dayModal'))
    document.getElementById('dayModal').classList.remove('open');
}

function saveDay(){
  const selected=document.querySelector('#shiftPicker .shift-option.selected');
  const note=document.getElementById('dayNote').value.trim();
  const oStart=document.getElementById('overrideStart').value;
  const oEnd=document.getElementById('overrideEnd').value;
  const oPause=document.getElementById('overridePause').value;

  if(selected){
    const allOpts=Array.from(document.querySelectorAll('#shiftPicker .shift-option'));
    const selIdx=allOpts.indexOf(selected);
    const orderedV=[
      ...vorlagen.filter(v=>ALL_GROUP_IDS.includes(v.id)).sort((a,b)=>ALL_GROUP_IDS.indexOf(a.id)-ALL_GROUP_IDS.indexOf(b.id)),
      ...vorlagen.filter(v=>!ALL_GROUP_IDS.includes(v.id))
    ];
    const v=orderedV[selIdx];
    if(!v) return;
    const entry={vorlageId:v.id,note};
    if(oStart&&oStart!==v.start) entry.customStart=oStart;
    if(oEnd&&oEnd!==v.end) entry.customEnd=oEnd;
    if(oPause!==''&&parseInt(oPause)!==(v.pause||0)) entry.customPause=parseInt(oPause);
    shifts[editingKey]=entry;
    // Save as last used
    lastShift={id:v.id};
    saveLastShift(lastShift);
    updateQuickBar();
  } else if(note){
    shifts[editingKey]={vorlageId:null,note};
  } else {
    delete shifts[editingKey];
  }
  saveShifts(shifts);
  document.getElementById('dayModal').classList.remove('open');
  renderCalendar();renderStats();
  showToast('Gespeichert ✓');
}

function clearDay(){
  delete shifts[editingKey];
  saveShifts(shifts);
  document.getElementById('dayModal').classList.remove('open');
  renderCalendar();renderStats();
  showToast('Gelöscht');
}

// ── VORLAGEN ──
let sortMode=false;
function toggleSortMode(){
  sortMode=!sortMode;
  document.getElementById('sortToggleBtn').textContent=sortMode?'✓ Fertig':'⇅ Sortieren';
  document.getElementById('sortToggleBtn').style.color=sortMode?'var(--green)':'var(--text2)';
  document.getElementById('sortToggleBtn').style.borderColor=sortMode?'var(--green)':'var(--border)';
  renderVorlagen();
}
function renderVorlagen(){
  const list=document.getElementById('vorlagenList');list.innerHTML='';
  vorlagen.forEach((v,i)=>{
    const net=calcNetMinutes(v,null);
    const h=Math.floor(net/60),m=net%60;
    const timeStr=v.start&&v.end?`${v.start}–${v.end}`:'variabel';
    const netStr=net>0?` | ${h}h${m?' '+m+'m':''}`:' ';
    const card=document.createElement('div');
    card.className='card';card.dataset.idx=i;
    if(sortMode) card.draggable=true;
    card.innerHTML=`<div class="card-header">
      <div class="card-title">
        ${sortMode?'<span class="drag-handle">⠿</span>':''}
        <span class="dot" style="background:${v.color}"></span>
        <span class="card-name">${v.name}</span>
        <span class="badge" style="background:${v.color}22;color:${v.color}">${v.kuerzel}</span>
      </div>
      ${!sortMode?`<div class="icon-btn" id="edit-${v.id}">✎</div>`:''}
    </div>
    <div class="card-meta">${timeStr}${v.pause?' | P:'+v.pause+'m':''}${netStr}</div>`;
    if(!sortMode){
      const vid=v.id;
      card.querySelector('#edit-'+vid).addEventListener('click', e=>{e.stopPropagation();editVorlage(vid);});
    }
    if(sortMode){
      card.addEventListener('dragstart',dragStart);
      card.addEventListener('dragover',dragOver);
      card.addEventListener('drop',dragDrop);
      card.addEventListener('dragend',dragEnd);
      card.addEventListener('touchstart',touchStart,{passive:true});
      card.addEventListener('touchmove',touchMove,{passive:false});
      card.addEventListener('touchend',touchEnd);
    }
    list.appendChild(card);
  });
}

let dragSrcIdx=null;
function dragStart(e){dragSrcIdx=parseInt(e.currentTarget.dataset.idx);e.currentTarget.classList.add('dragging');}
function dragOver(e){e.preventDefault();}
function dragDrop(e){
  e.preventDefault();
  const ti=parseInt(e.currentTarget.dataset.idx);
  if(dragSrcIdx===null||dragSrcIdx===ti) return;
  const m=vorlagen.splice(dragSrcIdx,1)[0];vorlagen.splice(ti,0,m);
  saveVorlagenData(vorlagen);renderVorlagen();
}
function dragEnd(e){e.currentTarget.classList.remove('dragging');dragSrcIdx=null;}

let touchDragIdx=null,touchClone=null,touchStartY=0;
function touchStart(e){
  touchDragIdx=parseInt(e.currentTarget.dataset.idx);
  touchStartY=e.touches[0].clientY;
  touchClone=e.currentTarget.cloneNode(true);
  touchClone.style.cssText=`position:fixed;left:16px;right:16px;z-index:999;opacity:.8;pointer-events:none;background:var(--bg3);padding:11px 13px;border-radius:12px;border:1px solid var(--border);`;
  touchClone.style.top=e.currentTarget.getBoundingClientRect().top+'px';
  document.body.appendChild(touchClone);
  e.currentTarget.style.opacity='.3';
}
function touchMove(e){
  e.preventDefault();
  if(!touchClone) return;
  const dy=e.touches[0].clientY-touchStartY;
  touchClone.style.top=(parseFloat(touchClone.style.top)+dy)+'px';
  touchStartY=e.touches[0].clientY;
}
function touchEnd(e){
  if(!touchClone) return;
  const midY=parseFloat(touchClone.style.top)+touchClone.offsetHeight/2;
  touchClone.remove();touchClone=null;
  const cards=Array.from(document.querySelectorAll('#vorlagenList .card'));
  let ti=touchDragIdx;
  cards.forEach(c=>{const r=c.getBoundingClientRect();if(midY>=r.top&&midY<=r.bottom)ti=parseInt(c.dataset.idx);});
  cards.forEach(c=>c.style.opacity='');
  if(ti!==touchDragIdx){const m=vorlagen.splice(touchDragIdx,1)[0];vorlagen.splice(ti,0,m);saveVorlagenData(vorlagen);}
  renderVorlagen();touchDragIdx=null;
}

function calcNetMinutes(v,sh){
  const s=(sh&&sh.customStart)?sh.customStart:v.start;
  const e2=(sh&&sh.customEnd)?sh.customEnd:v.end;
  const p=(sh&&sh.customPause!=null)?sh.customPause:(v.pause||0);
  if(!s||!e2) return 0;
  let [sh2,sm]=s.split(':').map(Number);
  let [eh,em]=e2.split(':').map(Number);
  let t=(eh*60+em)-(sh2*60+sm);if(t<0)t+=24*60;
  return Math.max(0,t-p);
}

let editingVorlageId=null;
function editVorlage(id){
  const v=vorlagen.find(x=>x.id===id);
  editingVorlageId=id;
  document.getElementById('vorlageModalTitle').textContent='Vorlage bearbeiten';
  document.getElementById('vName').value=v.name;
  document.getElementById('vKuerzel').value=v.kuerzel;

  document.getElementById('vEnd').value=v.end||'';
  document.getElementById('vPause').value=v.pause||0;
  document.getElementById('deleteVorlageBtn').style.display='';
  renderColorRow(v.color);
  document.getElementById('vorlageModal').classList.add('open');
}
function openNewVorlage(){
  editingVorlageId=null;
  document.getElementById('vorlageModalTitle').textContent='Neue Vorlage';
  ['vName','vKuerzel'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('vStart').value='06:00';
  document.getElementById('vEnd').value='14:00';
  document.getElementById('vPause').value='0';
  document.getElementById('deleteVorlageBtn').style.display='none';
  renderColorRow(COLORS[0]);
  document.getElementById('vorlageModal').classList.add('open');
}
function renderColorRow(selected){
  const row=document.getElementById('colorRow');row.innerHTML='';
  COLORS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(c===selected?' selected':'');
    sw.style.background=c;
    sw.onclick=()=>{row.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));sw.classList.add('selected');};
    row.appendChild(sw);
  });
}
function closeVorlageModal(e){
  if(!e||e.target===document.getElementById('vorlageModal'))
    document.getElementById('vorlageModal').classList.remove('open');
}
function saveVorlage(){
  const name=document.getElementById('vName').value.trim();
  const kuerzel=document.getElementById('vKuerzel').value.trim();
  const start=document.getElementById('vStart').value;
  const end=document.getElementById('vEnd').value;
  const pause=parseInt(document.getElementById('vPause').value)||0;
  const sel=document.querySelector('#colorRow .color-swatch.selected');
  const color=sel?sel.style.background:COLORS[0];
  if(!name||!kuerzel){showToast('Bezeichnung und Kürzel erforderlich');return;}
  if(editingVorlageId){
    const idx=vorlagen.findIndex(v=>v.id===editingVorlageId);
    vorlagen[idx]={...vorlagen[idx],name,kuerzel,start,end,pause,color};
  } else {
    vorlagen.push({id:'V'+Date.now(),name,kuerzel,start,end,pause,color});
  }
  saveVorlagenData(vorlagen);
  document.getElementById('vorlageModal').classList.remove('open');
  renderVorlagen();renderCalendar();
  showToast('Vorlage gespeichert ✓');
}

function deleteVorlage(){
  if(!editingVorlageId) return;
  vorlagen=vorlagen.filter(v=>v.id!==editingVorlageId);
  saveVorlagenData(vorlagen);
  document.getElementById('vorlageModal').classList.remove('open');
  renderVorlagen();renderCalendar();
  showToast('Vorlage gelöscht');
}
function resetVorlagen(){
  if(!confirm('Standard-Vorlagen wiederherstellen?\n\nDeine eigenen Vorlagen werden ergänzt, nicht gelöscht. Bereits vorhandene Standard-Vorlagen werden aktualisiert.')) return;
  const defaultIds=DEFAULT_VORLAGEN.map(v=>v.id);
  // Remove old default entries, keep custom ones
  const custom=vorlagen.filter(v=>!defaultIds.includes(v.id));
  vorlagen=[...JSON.parse(JSON.stringify(DEFAULT_VORLAGEN)),...custom];
  saveVorlagenData(vorlagen);
  renderVorlagen();renderCalendar();
  showToast('Standard-Vorlagen wiederhergestellt ✓');
}

// ── STATS ──
function changeStatsMonth(dir){
  statsMonth+=dir;
  if(statsMonth>11){statsMonth=0;statsYear++;}
  if(statsMonth<0){statsMonth=11;statsYear--;}
  renderStats();
}
function renderStats(){
  document.getElementById('statsMonthLabel').textContent=`${MONTHS[statsMonth]} ${statsYear}`;
  const dim=new Date(statsYear,statsMonth+1,0).getDate();
  let total=0,totalMin=0;const byType={},rows=[];
  for(let d=1;d<=dim;d++){
    const key=dateKey(statsYear,statsMonth,d);const sh=shifts[key];
    if(sh&&sh.vorlageId){
      const v=vorlagen.find(x=>x.id===sh.vorlageId);
      if(v){total++;const net=calcNetMinutes(v,sh);totalMin+=net;
        byType[v.kuerzel]=byType[v.kuerzel]||{count:0,color:v.color};byType[v.kuerzel].count++;
        rows.push({d,v,sh,net});}
    }
  }
  const th=Math.floor(totalMin/60),tm=totalMin%60;
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Schichten gesamt</div></div>
    <div class="stat-card"><div class="stat-val">${th}<span style="font-size:14px">h${tm?tm+'m':''}</span></div><div class="stat-label">Nettostunden</div></div>
    ${Object.entries(byType).map(([k,i])=>`<div class="stat-card" style="border-color:${i.color}55"><div class="stat-val" style="color:${i.color};font-size:18px">${i.count}×</div><div class="stat-label">${k}</div></div>`).join('')}`;
  const ml=document.getElementById('monthList');
  const dow=['So','Mo','Di','Mi','Do','Fr','Sa'];
  ml.innerHTML=rows.length===0?'<div style="color:var(--text3);font-size:13px;padding:16px 0">Keine Schichten in diesem Monat</div>':
    rows.map(r=>{
      const dn=dow[new Date(statsYear,statsMonth,r.d).getDay()];
      const h=Math.floor(r.net/60),m=r.net%60;
      const es=r.sh.customStart||r.v.start||'–';const ee=r.sh.customEnd||r.v.end||'–';
      return`<div class="month-row">
        <div class="month-row-date">${dn} ${String(r.d).padStart(2,'0')}.${String(statsMonth+1).padStart(2,'0')}.</div>
        <div class="month-row-shift" style="color:${r.v.color}">${r.v.kuerzel}${r.sh.customStart||r.sh.customEnd?'*':''}</div>
        <div class="month-row-hours">${es}–${ee}${r.net?' | '+h+'h'+(m?m+'m':''):''}</div>
      </div>`;
    }).join('');
  document.getElementById('exportArea').style.display='none';
  document.getElementById('copyBtn').style.display='none';
}

// ── EXPORT ──
let exportText='';
function buildExportText(){
  const dim=new Date(statsYear,statsMonth+1,0).getDate();
  const dow=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const lines=[`SCHICHTERFASSUNG ${MONTHS[statsMonth].toUpperCase()} ${statsYear}`,'='.repeat(54),''];
  let totalMin=0,totalShifts=0;
  for(let d=1;d<=dim;d++){
    const key=dateKey(statsYear,statsMonth,d);const sh=shifts[key];
    const dn=dow[new Date(statsYear,statsMonth,d).getDay()];
    const ds=`${dn} ${String(d).padStart(2,'0')}.${String(statsMonth+1).padStart(2,'0')}.${statsYear}`;
    if(sh&&sh.vorlageId){
      const v=vorlagen.find(x=>x.id===sh.vorlageId);
      if(v){const net=calcNetMinutes(v,sh);totalMin+=net;totalShifts++;
        const h=Math.floor(net/60),m=net%60;
        const es=sh.customStart||v.start||'–';const ee=sh.customEnd||v.end||'–';
        const ep=sh.customPause!=null?sh.customPause:(v.pause||0);
        const ns=net>0?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}h`:'–';
        lines.push(`${ds}  |  ${v.kuerzel.padEnd(4)}  |  ${es}-${ee}  |  P:${ep}m  |  ${ns}${sh.note?'  |  '+sh.note:''}`);}
    } else if(sh&&sh.note){lines.push(`${ds}  |  ----  |  ${sh.note}`);}
  }
  const th=Math.floor(totalMin/60),tm=totalMin%60;
  lines.push('','='.repeat(54),`Schichten gesamt: ${totalShifts}`,`Nettostunden:     ${th}h ${tm}min`,'',`Erstellt: ${new Date().toLocaleString('de-DE')}`);
  return lines.join('\n');
}

function exportMonth(){
  exportText=buildExportText();
  const ea=document.getElementById('exportArea');
  ea.textContent=exportText;ea.style.display='block';
  document.getElementById('copyBtn').style.display='block';
  showToast('Export bereit!');
}
function copyExport(){
  if(navigator.clipboard){navigator.clipboard.writeText(exportText).then(()=>showToast('Kopiert ✓'));}
  else{const ta=document.createElement('textarea');ta.value=exportText;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Kopiert ✓');}
}
function emailExport(){
  const txt=buildExportText();
  const subject=encodeURIComponent(`Schichterfassung ${MONTHS[statsMonth]} ${statsYear}`);
  const body=encodeURIComponent(txt);
  window.location.href=`mailto:?subject=${subject}&body=${body}`;
}

// ── BACKUP ──
function backupExport(){
  const data={version:1,exported:new Date().toISOString(),vorlagen,shifts};
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`Schichtplaner_Backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(url);
  showToast('Backup exportiert ✓');
}
function backupImport(event){
  const file=event.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.vorlagen||!data.shifts) throw new Error('Ungültiges Format');
      if(confirm(`Backup vom ${data.exported?new Date(data.exported).toLocaleString('de-DE'):'unbekannt'} wiederherstellen?\n\nAlle aktuellen Daten werden überschrieben!`)){
        vorlagen=data.vorlagen;shifts=data.shifts;
        saveVorlagenData(vorlagen);saveShifts(shifts);
        renderCalendar();renderVorlagen();renderStats();
        showToast('Backup wiederhergestellt ✓');
      }
    }catch(err){showToast('Fehler beim Importieren');}
  };
  reader.readAsText(file);
  event.target.value='';
}

// ── UI HELPERS ──
function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='stats') renderStats();
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function init(){
  document.getElementById('topbarDate').textContent=new Date().toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
  renderCalendar();renderVorlagen();renderStats();
}
init();
</script>
