<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Schichtplaner">
<title>Schichtplaner JVA</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0f1117;--bg2:#171b26;--bg3:#1e2333;--border:#2a3040;
    --accent:#4a9eff;--green:#2dce89;--yellow:#ffc107;--red:#f44336;
    --text:#e8eaf0;--text2:#8892a4;--text3:#4a5568;
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
    --c-frueh:#fa8072;--c-spaet:#4a9eff;--c-nacht:#2dce89;
    --c-frei:#ffc107;--c-lehr:#6b7280;--c-plan:#e05000;--c-beige:#a0522d;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow-x:hidden;overflow-y:auto;}

  .topbar{position:sticky;top:0;z-index:100;background:rgba(15,17,23,0.97);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
  .topbar-title{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;}
  .topbar-date{font-family:var(--mono);font-size:11px;color:var(--text2);}

  .bottom-nav{position:sticky;bottom:0;z-index:100;background:rgba(15,17,23,0.97);border-top:1px solid var(--border);display:flex;}
  .nav-btn{flex:1;padding:10px 4px 8px;background:none;border:none;color:var(--text3);font-family:var(--sans);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:color .2s;}
  .nav-btn.active{color:var(--accent);}
  .nav-btn svg{width:20px;height:20px;}

  .view{display:none;padding:16px;}
  .view.active{display:block;}

  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .cal-month{font-family:var(--mono);font-size:16px;font-weight:600;}
  .cal-nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
  .cal-wd{text-align:center;font-family:var(--mono);font-size:10px;color:var(--text3);padding:4px 0;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
  .cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;border:1px solid transparent;transition:border-color .15s;}
  .cal-day.empty{background:none;cursor:default;}
  .cal-day.today{border-color:var(--accent)!important;}
  .cal-day-num{font-family:var(--mono);font-size:11px;font-weight:500;z-index:1;line-height:1;}
  .cal-day-label{font-size:7px;font-weight:600;letter-spacing:.03em;z-index:1;margin-top:2px;text-transform:uppercase;}
  .cal-day-bg{position:absolute;inset:0;}
  .cal-day.no-shift{background:var(--bg2);}
  .cal-day.no-shift .cal-day-num{color:var(--text2);}

  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.75);display:none;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px 24px;animation:slideUp .25s ease;max-height:92vh;overflow-y:auto;}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
  .modal-title{font-family:var(--mono);font-size:14px;color:var(--accent);margin-bottom:12px;}

  .shift-group-label{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin:10px 0 6px;grid-column:1/-1;}
  .shift-picker{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
  .shift-option{padding:9px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:all .15s;text-align:left;}
  .shift-option.selected{border-color:var(--sc,var(--accent));background:rgba(74,158,255,.1);}
  .shift-option-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:1px;line-height:1.3;}
  .shift-option-time{font-family:var(--mono);font-size:9px;color:var(--text2);}
  .shift-option-dot{width:7px;height:7px;border-radius:50%;margin-bottom:4px;}

  .time-override-section{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;}
  .time-override-title{font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:10px;}
  .time-override-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .time-override-label{font-size:11px;color:var(--text2);width:48px;flex-shrink:0;}
  .time-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:13px;padding:7px 9px;width:100%;}
  .time-input:focus{outline:none;border-color:var(--accent);}
  .override-hint{font-size:10px;color:var(--text3);margin-top:2px;}

  .note-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:var(--sans);font-size:14px;padding:10px 12px;margin-bottom:12px;resize:none;height:52px;}
  .note-input:focus{outline:none;border-color:var(--accent);}

  .btn-row{display:flex;gap:8px;}
  .btn{flex:1;padding:12px;border-radius:10px;border:none;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s;}
  .btn:active{opacity:.75;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-secondary{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
  .btn-danger{background:rgba(244,67,54,.15);color:var(--red);border:1px solid rgba(244,67,54,.3);}

  .section-title{font-family:var(--mono);font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:grab;}
  .card.dragging{opacity:.4;}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .card-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;}
  .drag-handle{color:var(--text3);font-size:16px;cursor:grab;padding:0 4px;touch-action:none;}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .card-meta{font-family:var(--mono);font-size:11px;color:var(--text2);}
  .icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;}
  .badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;}

  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;}
  .stat-val{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--accent);}
  .stat-label{font-size:11px;color:var(--text2);margin-top:2px;}

  .export-btn{width:100%;padding:14px;background:var(--bg2);border:1px solid var(--accent);border-radius:12px;color:var(--accent);font-family:var(--mono);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;transition:background .15s;}
  .export-btn:active{background:rgba(74,158,255,.1);}
  .month-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
  .month-row-date{font-family:var(--mono);font-size:12px;color:var(--text2);}
  .month-row-shift{font-size:13px;font-weight:500;}
  .month-row-hours{font-family:var(--mono);font-size:12px;color:var(--text2);}

  .form-group{margin-bottom:12px;}
  .form-label{font-size:11px;color:var(--text2);margin-bottom:4px;display:block;font-family:var(--mono);}
  .form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;padding:9px 11px;}
  .form-input:focus{outline:none;border-color:var(--accent);}
  .color-row{display:flex;gap:8px;flex-wrap:wrap;}
  .color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s;}
  .color-swatch.selected{border-color:white;}

  #exportArea{display:none;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--text2);white-space:pre;overflow-x:auto;line-height:1.6;}
  .copy-btn{width:100%;padding:10px;background:var(--bg3);border:1px solid var(--green);border-radius:10px;color:var(--green);font-family:var(--mono);font-size:12px;cursor:pointer;margin-top:8px;display:none;}
  .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 16px;font-size:13px;color:var(--text);z-index:300;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;}
  .toast.show{opacity:1;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">⬛ Schichtplaner</div>
  <div class="topbar-date" id="topbarDate"></div>
</div>

<div class="content">
  <div class="view active" id="view-cal">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="calMonthLabel"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-weekdays">
      <div class="cal-wd">Mo</div><div class="cal-wd">Di</div><div class="cal-wd">Mi</div>
      <div class="cal-wd">Do</div><div class="cal-wd">Fr</div>
      <div class="cal-wd" style="color:#ff6b35">Sa</div>
      <div class="cal-wd" style="color:#f44336">So</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="view" id="view-vorlagen">
    <div class="section-title">Vorlagen (halten &amp; ziehen zum Sortieren)</div>
    <div id="vorlagenList"></div>
    <button class="export-btn" onclick="openNewVorlage()" style="border-color:var(--green);color:var(--green);margin-top:6px">
      <span>+</span> Neue Vorlage anlegen
    </button>
  </div>

  <div class="view" id="view-stats">
    <div class="cal-header" style="margin-bottom:12px">
      <button class="cal-nav-btn" onclick="changeStatsMonth(-1)">‹</button>
      <div class="cal-month" id="statsMonthLabel"></div>
      <button class="cal-nav-btn" onclick="changeStatsMonth(1)">›</button>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <button class="export-btn" onclick="exportMonth()">📄 Monatsexport anzeigen</button>
    <div id="exportArea"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyExport()">📋 Text kopieren</button>
    <div class="section-title" style="margin-top:16px">Schichten im Monat</div>
    <div id="monthList"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showView('cal',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Kalender
  </button>
  <button class="nav-btn" onclick="showView('vorlagen',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Vorlagen
  </button>
  <button class="nav-btn" onclick="showView('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Auswertung
  </button>
</div>

<!-- MODAL: Tag -->
<div class="modal-overlay" id="dayModal" onclick="closeDayModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="dayModalTitle">Tag bearbeiten</div>
    <div class="shift-picker" id="shiftPicker"></div>
    <div class="time-override-section" id="timeOverrideSection" style="display:none">
      <div class="time-override-title">⏱ Zeiten anpassen (optional)</div>
      <div class="time-override-row">
        <span class="time-override-label">Beginn</span>
        <input class="time-input" type="time" id="overrideStart">
      </div>
      <div class="time-override-row">
        <span class="time-override-label">Ende</span>
        <input class="time-input" type="time" id="overrideEnd">
      </div>
      <div class="time-override-row">
        <span class="time-override-label">Pause</span>
        <input class="time-input" type="number" id="overridePause" min="0" max="120" placeholder="Min.">
      </div>
      <div class="override-hint">Leer lassen = Vorlage-Zeiten verwenden</div>
    </div>
    <textarea class="note-input" id="dayNote" placeholder="Notiz (optional)…"></textarea>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="clearDay()">Löschen</button>
      <button class="btn btn-secondary" onclick="closeDayModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveDay()">Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL: Vorlage -->
<div class="modal-overlay" id="vorlageModal" onclick="closeVorlageModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="vorlageModalTitle">Vorlage bearbeiten</div>
    <div class="form-group">
      <label class="form-label">Bezeichnung</label>
      <input class="form-input" id="vName" placeholder="z.B. Frühdienst F1">
    </div>
    <div class="form-group">
      <label class="form-label">Kürzel (max 4 Zeichen)</label>
      <input class="form-input" id="vKuerzel" placeholder="z.B. F1" maxlength="4">
    </div>
    <div class="form-group">
      <label class="form-label">Beginn (leer = variabel)</label>
      <input class="form-input" type="time" id="vStart">
    </div>
    <div class="form-group">
      <label class="form-label">Ende (leer = variabel)</label>
      <input class="form-input" type="time" id="vEnd">
    </div>
    <div class="form-group">
      <label class="form-label">Pause (Minuten, 0 = keine)</label>
      <input class="form-input" type="number" id="vPause" placeholder="0" min="0" max="120">
    </div>
    <div class="form-group">
      <label class="form-label">Farbe</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="btn-row" style="margin-top:4px">
      <button class="btn btn-danger" id="deleteVorlageBtn" onclick="deleteVorlage()">Löschen</button>
      <button class="btn btn-secondary" onclick="closeVorlageModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveVorlage()">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const C = {
  frueh: '#fa8072', spaet: '#4a9eff', nacht: '#2dce89',
  frei: '#ffc107', lehr: '#6b7280', plan: '#e05000', beige: '#a0522d'
};

const COLORS = [C.frueh,'#e05a4a',C.spaet,'#2266cc',C.nacht,'#1a9e6a',C.frei,'#e6a800',C.lehr,'#9ca3af',C.plan,'#c24000',C.beige,'#8b4513','#9c6bff'];

const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

const DEFAULT_VORLAGEN = [
  // Frühdienste
  {id:'F1', name:'Frühdienst F1',          kuerzel:'F1',  start:'05:50',end:'14:20',pause:30, color:C.frueh},
  {id:'F2', name:'Frühdienst F2',          kuerzel:'F2',  start:'05:50',end:'14:20',pause:30, color:C.frueh},
  {id:'F3', name:'Frühdienst F3',          kuerzel:'F3',  start:'05:50',end:'14:20',pause:30, color:C.frueh},
  {id:'FZ', name:'Frühdienst Zentrale',    kuerzel:'FZ',  start:'05:50',end:'14:20',pause:30, color:C.frueh},
  // Spätdienste
  {id:'S1', name:'Spätdienst S1',          kuerzel:'S1',  start:'14:10',end:'22:10',pause:0,  color:C.spaet},
  {id:'S2', name:'Spätdienst S2',          kuerzel:'S2',  start:'14:10',end:'22:10',pause:0,  color:C.spaet},
  {id:'S3', name:'Spätdienst S3',          kuerzel:'S3',  start:'14:10',end:'22:10',pause:0,  color:C.spaet},
  {id:'SZ', name:'Spätdienst Zentrale',    kuerzel:'SZ',  start:'14:10',end:'22:10',pause:0,  color:C.spaet},
  // Nachtdienste
  {id:'N1', name:'Nachtdienst N1',         kuerzel:'N1',  start:'22:00',end:'06:00',pause:0,  color:C.nacht},
  {id:'N2', name:'Nachtdienst N2',         kuerzel:'N2',  start:'22:00',end:'06:00',pause:0,  color:C.nacht},
  {id:'NZ', name:'Nachtdienst Zentrale',   kuerzel:'NZ',  start:'22:00',end:'06:00',pause:0,  color:C.nacht},
  // WE/FT Tagdienste
  {id:'F1W',name:'Tagdienst F1 WE/FT',    kuerzel:'F1W', start:'06:00',end:'18:00',pause:30, color:C.frueh},
  {id:'F2W',name:'Tagdienst F2 WE/FT',    kuerzel:'F2W', start:'06:00',end:'13:00',pause:0,  color:C.frueh},
  {id:'FZW',name:'Tagdienst Zentrale WE/FT',kuerzel:'FZW',start:'06:00',end:'18:00',pause:30,color:C.frueh},
  {id:'TW', name:'Tagdienst WE/Feiertag', kuerzel:'TW',  start:'06:00',end:'18:00',pause:30, color:C.frueh},
  // WE/FT Nachtdienste
  {id:'N1W',name:'Nachtdienst N1 WE/FT',  kuerzel:'N1W', start:'18:00',end:'06:00',pause:0,  color:C.nacht},
  {id:'N2W',name:'Nachtdienst N2 WE/FT',  kuerzel:'N2W', start:'18:00',end:'06:00',pause:0,  color:C.nacht},
  {id:'NZW',name:'Nachtdienst Zentrale WE/FT',kuerzel:'NZW',start:'18:00',end:'06:00',pause:0,color:C.nacht},
  {id:'NW', name:'Nachtdienst WE/Feiertag',kuerzel:'NW', start:'18:00',end:'06:00',pause:0,  color:C.nacht},
  // Besuch / Küche / zbV
  {id:'HB', name:'Tagdienst Besuch',       kuerzel:'HB',  start:'07:00',end:'16:00',pause:30, color:C.beige},
  {id:'HBF',name:'Tagdienst Besuch Fr',    kuerzel:'HBF', start:'07:00',end:'13:00',pause:0,  color:C.beige},
  {id:'KÜW',name:'Küche WE/FT',           kuerzel:'KÜW', start:'07:00',end:'18:00',pause:30, color:C.beige},
  {id:'KÜ', name:'Küche',                 kuerzel:'KÜ',  start:'07:00',end:'16:00',pause:30, color:C.beige},
  {id:'KÜF',name:'Küche Freitag',         kuerzel:'KÜF', start:'07:00',end:'13:00',pause:0,  color:C.beige},
  {id:'zbV',name:'Tagdienst zbV',         kuerzel:'zbV', start:'07:00',end:'16:00',pause:30, color:C.beige},
  {id:'zbVF',name:'Tagdienst zbV Freitag',kuerzel:'zbVF',start:'07:00',end:'13:00',pause:0,  color:C.beige},
  // KH-Überwachung
  {id:'KHF',name:'KH-Überwachung Früh',   kuerzel:'KHF', start:'06:00',end:'14:00',pause:0,  color:C.frueh},
  {id:'KHS',name:'KH-Überwachung Spät',   kuerzel:'KHS', start:'14:00',end:'22:00',pause:0,  color:C.spaet},
  {id:'KHN',name:'KH-Überwachung Nacht',  kuerzel:'KHN', start:'22:00',end:'06:00',pause:0,  color:C.nacht},
  // Sonstiges
  {id:'Lehr',name:'Lehrgang / zbV',       kuerzel:'Lehr',start:'',    end:'',      pause:0,  color:C.lehr},
  {id:'DF',  name:'Dienstfrei',           kuerzel:'DF',  start:'',    end:'',      pause:0,  color:C.frei},
  {id:'URL', name:'Urlaub',               kuerzel:'URL', start:'00:00',end:'08:00',pause:0,  color:C.frei},
  {id:'UFP', name:'Urlaub/Frei Planung',  kuerzel:'UFP', start:'',    end:'',      pause:0,  color:C.plan},
  {id:'DVP', name:'Dienst Vorplanung',    kuerzel:'DVP', start:'',    end:'',      pause:0,  color:C.frueh},
  {id:'NDP', name:'Nachtdienst Planung',  kuerzel:'NDP', start:'',    end:'',      pause:0,  color:C.plan},
];

function lsGet(k){try{return localStorage.getItem(k);}catch(e){return _mem[k]||null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){_mem[k]=v;}}
const _mem={};

function loadVorlagen(){const r=lsGet('sp_vorlagen');return r?JSON.parse(r):JSON.parse(JSON.stringify(DEFAULT_VORLAGEN));}
function saveVorlagenData(v){lsSet('sp_vorlagen',JSON.stringify(v));}
function loadShifts(){const r=lsGet('sp_shifts');return r?JSON.parse(r):{};}
function saveShifts(s){lsSet('sp_shifts',JSON.stringify(s));}

let vorlagen=loadVorlagen();
let shifts=loadShifts();

const TODAY=new Date();TODAY.setHours(0,0,0,0);
let calYear=TODAY.getFullYear(),calMonth=TODAY.getMonth();
let statsYear=calYear,statsMonth=calMonth;

function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}

function renderCalendar(){
  document.getElementById('calMonthLabel').textContent=`${MONTHS[calMonth]} ${calYear}`;
  const grid=document.getElementById('calGrid');grid.innerHTML='';
  const first=new Date(calYear,calMonth,1);
  let sd=first.getDay();sd=sd===0?6:sd-1;
  const dim=new Date(calYear,calMonth+1,0).getDate();
  for(let i=0;i<sd;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const key=dateKey(calYear,calMonth,d);
    const sh=shifts[key];
    const v=sh?vorlagen.find(x=>x.id===sh.vorlageId):null;
    const isToday=new Date(calYear,calMonth,d).getTime()===TODAY.getTime();
    const cell=document.createElement('div');
    cell.className='cal-day'+(v?'':' no-shift')+(isToday?' today':'');
    const hasCustom=sh&&(sh.customStart||sh.customEnd);
    if(v){
      cell.innerHTML=`<div class="cal-day-bg" style="background:${v.color};opacity:0.22"></div>
        <div class="cal-day-num" style="color:${v.color}">${d}</div>
        <div class="cal-day-label" style="color:${v.color}">${v.kuerzel}${hasCustom?'*':''}</div>`;
    } else {
      cell.innerHTML=`<div class="cal-day-num">${d}</div><div class="cal-day-label">${sh&&sh.note?'📝':''}</div>`;
    }
    cell.onclick=()=>openDayModal(key,d);
    grid.appendChild(cell);
  }
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}

let editingKey=null;

function openDayModal(key,d){
  editingKey=key;
  const dow=new Date(calYear,calMonth,d).getDay();
  const dn=['So','Mo','Di','Mi','Do','Fr','Sa'];
  document.getElementById('dayModalTitle').textContent=`${dn[dow]}, ${d}. ${MONTHS[calMonth]} ${calYear}`;
  const ex=shifts[key];
  document.getElementById('dayNote').value=ex?(ex.note||''):'';
  document.getElementById('overrideStart').value=ex&&ex.customStart?ex.customStart:'';
  document.getElementById('overrideEnd').value=ex&&ex.customEnd?ex.customEnd:'';
  document.getElementById('overridePause').value=ex&&ex.customPause!=null?ex.customPause:'';

  const picker=document.getElementById('shiftPicker');picker.innerHTML='';

  // Group vorlagen for display
  const groups=[
    {label:'Frühdienste',ids:['F1','F2','F3','FZ']},
    {label:'Spätdienste',ids:['S1','S2','S3','SZ']},
    {label:'Nachtdienste',ids:['N1','N2','NZ','N1W','N2W','NZW','NW']},
    {label:'WE/Feiertag – Tag',ids:['F1W','F2W','FZW','TW']},
    {label:'Besuch / Küche / zbV',ids:['HB','HBF','KÜW','KÜ','KÜF','zbV','zbVF']},
    {label:'KH-Überwachung',ids:['KHF','KHS','KHN']},
    {label:'Sonstiges',ids:['Lehr','DF','URL','UFP','DVP','NDP']},
  ];

  // Build ordered list: grouped first, then any custom vorlagen not in groups
  const groupedIds=groups.flatMap(g=>g.ids);
  const customExtra=vorlagen.filter(v=>!groupedIds.includes(v.id));

  groups.forEach(g=>{
    const inGroup=vorlagen.filter(v=>g.ids.includes(v.id));
    if(inGroup.length===0) return;
    const lbl=document.createElement('div');
    lbl.className='shift-group-label';lbl.textContent=g.label;
    picker.appendChild(lbl);
    inGroup.forEach(v=>picker.appendChild(makeShiftOption(v,ex)));
  });
  if(customExtra.length>0){
    const lbl=document.createElement('div');lbl.className='shift-group-label';lbl.textContent='Weitere Vorlagen';
    picker.appendChild(lbl);
    customExtra.forEach(v=>picker.appendChild(makeShiftOption(v,ex)));
  }

  document.getElementById('timeOverrideSection').style.display=(ex&&ex.vorlageId)?'block':'none';
  if(ex&&ex.vorlageId){
    const v=vorlagen.find(x=>x.id===ex.vorlageId);
    if(v){
      if(!ex.customStart&&v.start) document.getElementById('overrideStart').value=v.start;
      if(!ex.customEnd&&v.end) document.getElementById('overrideEnd').value=v.end;
      if(ex.customPause==null) document.getElementById('overridePause').value=v.pause||0;
    }
  }
  document.getElementById('dayModal').classList.add('open');
}

function makeShiftOption(v,ex){
  const opt=document.createElement('div');
  opt.className='shift-option'+(ex&&ex.vorlageId===v.id?' selected':'');
  opt.style.setProperty('--sc',v.color);
  const timeStr=v.start&&v.end?`${v.start}–${v.end}`:'variabel';
  opt.innerHTML=`<div class="shift-option-dot" style="background:${v.color}"></div>
    <div class="shift-option-name">${v.name}</div>
    <div class="shift-option-time">${timeStr}${v.pause?' | '+v.pause+'min':''}</div>`;
  opt.onclick=()=>{
    const was=opt.classList.contains('selected');
    document.querySelectorAll('#shiftPicker .shift-option').forEach(o=>o.classList.remove('selected'));
    if(!was){
      opt.classList.add('selected');
      if(v.start) document.getElementById('overrideStart').value=v.start;
      if(v.end) document.getElementById('overrideEnd').value=v.end;
      document.getElementById('overridePause').value=v.pause||0;
      document.getElementById('timeOverrideSection').style.display='block';
    } else {
      document.getElementById('timeOverrideSection').style.display='none';
    }
  };
  return opt;
}

function closeDayModal(e){
  if(!e||e.target===document.getElementById('dayModal'))
    document.getElementById('dayModal').classList.remove('open');
}

function saveDay(){
  const selected=document.querySelector('#shiftPicker .shift-option.selected');
  const note=document.getElementById('dayNote').value.trim();
  const oStart=document.getElementById('overrideStart').value;
  const oEnd=document.getElementById('overrideEnd').value;
  const oPause=document.getElementById('overridePause').value;
  if(selected){
    // find vorlage by matching name shown
    const allOpts=Array.from(document.querySelectorAll('#shiftPicker .shift-option'));
    const idx=allOpts.indexOf(selected);
    // map back to vorlage by index among all rendered options
    const allRendered=[];
    const gIds=['F1','F2','F3','FZ','S1','S2','S3','SZ','N1','N2','NZ','N1W','N2W','NZW','NW','F1W','F2W','FZW','TW','HB','HBF','KÜW','KÜ','KÜF','zbV','zbVF','KHF','KHS','KHN','Lehr','DF','URL','UFP','DVP','NDP'];
    const ordered=[...vorlagen.filter(v=>gIds.includes(v.id)).sort((a,b)=>gIds.indexOf(a.id)-gIds.indexOf(b.id)),...vorlagen.filter(v=>!gIds.includes(v.id))];
    const v=ordered[idx];
    if(!v) return;
    const entry={vorlageId:v.id,note};
    if(oStart&&oStart!==v.start) entry.customStart=oStart;
    if(oEnd&&oEnd!==v.end) entry.customEnd=oEnd;
    if(oPause!==''&&parseInt(oPause)!==(v.pause||0)) entry.customPause=parseInt(oPause);
    shifts[editingKey]=entry;
  } else if(note){
    shifts[editingKey]={vorlageId:null,note};
  } else {
    delete shifts[editingKey];
  }
  saveShifts(shifts);
  document.getElementById('dayModal').classList.remove('open');
  renderCalendar();renderStats();
  showToast('Gespeichert ✓');
}

function clearDay(){
  delete shifts[editingKey];
  saveShifts(shifts);
  document.getElementById('dayModal').classList.remove('open');
  renderCalendar();renderStats();
  showToast('Gelöscht');
}

// ─── VORLAGEN ───
function renderVorlagen(){
  const list=document.getElementById('vorlagenList');
  list.innerHTML='';
  vorlagen.forEach((v,i)=>{
    const net=calcNetMinutes(v,null);
    const h=Math.floor(net/60),m=net%60;
    const timeStr=v.start&&v.end?`${v.start} – ${v.end}`:'variabel';
    const netStr=net>0?` | Netto: ${h}h${m?' '+m+'min':''}`:'';
    const card=document.createElement('div');
    card.className='card';card.draggable=true;card.dataset.idx=i;
    card.innerHTML=`<div class="card-header">
      <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0;">
        <span class="drag-handle">⠿</span>
        <span class="dot" style="background:${v.color}"></span>
        <span class="card-title" style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${v.name}</span>
        <span class="badge" style="background:${v.color}22;color:${v.color};flex-shrink:0">${v.kuerzel}</span>
      </div>
      <div class="icon-btn" style="margin-left:8px" onclick="editVorlage('${v.id}')">✎</div>
    </div>
    <div class="card-meta">${timeStr}${v.pause?' | Pause: '+v.pause+'min':''}${netStr}</div>`;
    // Drag events
    card.addEventListener('dragstart',dragStart);
    card.addEventListener('dragover',dragOver);
    card.addEventListener('drop',dragDrop);
    card.addEventListener('dragend',dragEnd);
    // Touch drag
    card.addEventListener('touchstart',touchStart,{passive:true});
    card.addEventListener('touchmove',touchMove,{passive:false});
    card.addEventListener('touchend',touchEnd);
    list.appendChild(card);
  });
}

// Drag & Drop (mouse)
let dragSrcIdx=null;
function dragStart(e){dragSrcIdx=parseInt(e.currentTarget.dataset.idx);e.currentTarget.classList.add('dragging');}
function dragOver(e){e.preventDefault();}
function dragDrop(e){
  e.preventDefault();
  const targetIdx=parseInt(e.currentTarget.dataset.idx);
  if(dragSrcIdx===null||dragSrcIdx===targetIdx) return;
  const moved=vorlagen.splice(dragSrcIdx,1)[0];
  vorlagen.splice(targetIdx,0,moved);
  saveVorlagenData(vorlagen);renderVorlagen();
}
function dragEnd(e){e.currentTarget.classList.remove('dragging');dragSrcIdx=null;}

// Touch drag
let touchDragIdx=null,touchClone=null,touchStartY=0;
function touchStart(e){
  touchDragIdx=parseInt(e.currentTarget.dataset.idx);
  touchStartY=e.touches[0].clientY;
  touchClone=e.currentTarget.cloneNode(true);
  touchClone.style.cssText=`position:fixed;left:0;right:0;z-index:999;opacity:.8;pointer-events:none;background:var(--bg3);padding:12px 14px;`;
  touchClone.style.top=e.currentTarget.getBoundingClientRect().top+'px';
  document.body.appendChild(touchClone);
  e.currentTarget.style.opacity='.3';
}
function touchMove(e){
  e.preventDefault();
  if(!touchClone) return;
  const dy=e.touches[0].clientY-touchStartY;
  touchClone.style.top=(parseFloat(touchClone.style.top)+dy)+'px';
  touchStartY=e.touches[0].clientY;
}
function touchEnd(e){
  if(!touchClone) return;
  const cloneRect=touchClone.getBoundingClientRect();
  const midY=cloneRect.top+cloneRect.height/2;
  touchClone.remove();touchClone=null;
  // find target card
  const cards=Array.from(document.querySelectorAll('#vorlagenList .card'));
  let targetIdx=touchDragIdx;
  cards.forEach((c,i)=>{
    const r=c.getBoundingClientRect();
    if(midY>=r.top&&midY<=r.bottom) targetIdx=parseInt(c.dataset.idx);
  });
  cards.forEach(c=>c.style.opacity='');
  if(targetIdx!==touchDragIdx){
    const moved=vorlagen.splice(touchDragIdx,1)[0];
    vorlagen.splice(targetIdx,0,moved);
    saveVorlagenData(vorlagen);
  }
  renderVorlagen();touchDragIdx=null;
}

function calcNetMinutes(v,sh){
  const start=(sh&&sh.customStart)?sh.customStart:v.start;
  const end=(sh&&sh.customEnd)?sh.customEnd:v.end;
  const pause=(sh&&sh.customPause!=null)?sh.customPause:(v.pause||0);
  if(!start||!end) return 0;
  let [sh2,sm]=start.split(':').map(Number);
  let [eh,em]=end.split(':').map(Number);
  let total=(eh*60+em)-(sh2*60+sm);
  if(total<0) total+=24*60;
  return Math.max(0,total-pause);
}

let editingVorlageId=null;
function editVorlage(id){
  const v=vorlagen.find(x=>x.id===id);
  editingVorlageId=id;
  document.getElementById('vorlageModalTitle').textContent='Vorlage bearbeiten';
  document.getElementById('vName').value=v.name;
  document.getElementById('vKuerzel').value=v.kuerzel;
  document.getElementById('vStart').value=v.start||'';
  document.getElementById('vEnd').value=v.end||'';
  document.getElementById('vPause').value=v.pause||0;
  document.getElementById('deleteVorlageBtn').style.display='';
  renderColorRow(v.color);
  document.getElementById('vorlageModal').classList.add('open');
}
function openNewVorlage(){
  editingVorlageId=null;
  document.getElementById('vorlageModalTitle').textContent='Neue Vorlage';
  ['vName','vKuerzel'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('vStart').value='06:00';
  document.getElementById('vEnd').value='14:00';
  document.getElementById('vPause').value='0';
  document.getElementById('deleteVorlageBtn').style.display='none';
  renderColorRow(COLORS[0]);
  document.getElementById('vorlageModal').classList.add('open');
}
function renderColorRow(selected){
  const row=document.getElementById('colorRow');row.innerHTML='';
  COLORS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(c===selected?' selected':'');
    sw.style.background=c;
    sw.onclick=()=>{row.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));sw.classList.add('selected');};
    row.appendChild(sw);
  });
}
function closeVorlageModal(e){
  if(!e||e.target===document.getElementById('vorlageModal'))
    document.getElementById('vorlageModal').classList.remove('open');
}
function saveVorlage(){
  const name=document.getElementById('vName').value.trim();
  const kuerzel=document.getElementById('vKuerzel').value.trim();
  const start=document.getElementById('vStart').value;
  const end=document.getElementById('vEnd').value;
  const pause=parseInt(document.getElementById('vPause').value)||0;
  const sel=document.querySelector('#colorRow .color-swatch.selected');
  const color=sel?sel.style.background:COLORS[0];
  if(!name||!kuerzel){showToast('Bezeichnung und Kürzel erforderlich');return;}
  if(editingVorlageId){
    const idx=vorlagen.findIndex(v=>v.id===editingVorlageId);
    vorlagen[idx]={...vorlagen[idx],name,kuerzel,start,end,pause,color};
  } else {
    vorlagen.push({id:'V'+Date.now(),name,kuerzel,start,end,pause,color});
  }
  saveVorlagenData(vorlagen);
  document.getElementById('vorlageModal').classList.remove('open');
  renderVorlagen();renderCalendar();
  showToast('Vorlage gespeichert ✓');
}
function deleteVorlage(){
  if(!editingVorlageId) return;
  vorlagen=vorlagen.filter(v=>v.id!==editingVorlageId);
  saveVorlagenData(vorlagen);
  document.getElementById('vorlageModal').classList.remove('open');
  renderVorlagen();renderCalendar();
  showToast('Vorlage gelöscht');
}

// ─── STATS ───
function changeStatsMonth(dir){
  statsMonth+=dir;
  if(statsMonth>11){statsMonth=0;statsYear++;}
  if(statsMonth<0){statsMonth=11;statsYear--;}
  renderStats();
}
function renderStats(){
  document.getElementById('statsMonthLabel').textContent=`${MONTHS[statsMonth]} ${statsYear}`;
  const dim=new Date(statsYear,statsMonth+1,0).getDate();
  let total=0,totalMin=0;
  const byType={},rows=[];
  for(let d=1;d<=dim;d++){
    const key=dateKey(statsYear,statsMonth,d);
    const sh=shifts[key];
    if(sh&&sh.vorlageId){
      const v=vorlagen.find(x=>x.id===sh.vorlageId);
      if(v){
        total++;
        const net=calcNetMinutes(v,sh);totalMin+=net;
        byType[v.kuerzel]=byType[v.kuerzel]||{count:0,color:v.color};
        byType[v.kuerzel].count++;
        rows.push({d,v,sh,net});
      }
    }
  }
  const th=Math.floor(totalMin/60),tm=totalMin%60;
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Schichten gesamt</div></div>
    <div class="stat-card"><div class="stat-val">${th}<span style="font-size:14px">h${tm?tm+'m':''}</span></div><div class="stat-label">Nettostunden</div></div>
    ${Object.entries(byType).map(([k,i])=>`<div class="stat-card" style="border-color:${i.color}55"><div class="stat-val" style="color:${i.color};font-size:18px">${i.count}x</div><div class="stat-label">${k}</div></div>`).join('')}`;
  const ml=document.getElementById('monthList');
  const dow=['So','Mo','Di','Mi','Do','Fr','Sa'];
  ml.innerHTML=rows.length===0?'<div style="color:var(--text3);font-size:13px;padding:16px 0">Keine Schichten in diesem Monat</div>':
    rows.map(r=>{
      const dn=dow[new Date(statsYear,statsMonth,r.d).getDay()];
      const h=Math.floor(r.net/60),m=r.net%60;
      const es=r.sh.customStart||r.v.start||'–';
      const ee=r.sh.customEnd||r.v.end||'–';
      return`<div class="month-row">
        <div class="month-row-date">${dn} ${String(r.d).padStart(2,'0')}.${String(statsMonth+1).padStart(2,'0')}.</div>
        <div class="month-row-shift" style="color:${r.v.color}">${r.v.kuerzel}${r.sh.customStart||r.sh.customEnd?'*':''}</div>
        <div class="month-row-hours">${es}–${ee}${r.net?' | '+h+'h'+(m?m+'m':''):''}</div>
      </div>`;
    }).join('');
  document.getElementById('exportArea').style.display='none';
  document.getElementById('copyBtn').style.display='none';
}

let exportText='';
function exportMonth(){
  const dim=new Date(statsYear,statsMonth+1,0).getDate();
  const dow=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const lines=[`SCHICHTERFASSUNG ${MONTHS[statsMonth].toUpperCase()} ${statsYear}`,'='.repeat(52),''];
  let totalMin=0,totalShifts=0;
  for(let d=1;d<=dim;d++){
    const key=dateKey(statsYear,statsMonth,d);
    const sh=shifts[key];
    const dn=dow[new Date(statsYear,statsMonth,d).getDay()];
    const ds=`${dn} ${String(d).padStart(2,'0')}.${String(statsMonth+1).padStart(2,'0')}.${statsYear}`;
    if(sh&&sh.vorlageId){
      const v=vorlagen.find(x=>x.id===sh.vorlageId);
      if(v){
        const net=calcNetMinutes(v,sh);totalMin+=net;totalShifts++;
        const h=Math.floor(net/60),m=net%60;
        const es=sh.customStart||v.start||'–';
        const ee=sh.customEnd||v.end||'–';
        const ep=sh.customPause!=null?sh.customPause:(v.pause||0);
        const netStr=net>0?`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}h`:'–';
        lines.push(`${ds}  |  ${v.kuerzel.padEnd(4)}  |  ${es}-${ee}  |  P:${ep}min  |  ${netStr}${sh.note?'  |  '+sh.note:''}`);
      }
    } else if(sh&&sh.note){
      lines.push(`${ds}  |  ----  |  ${sh.note}`);
    }
  }
  lines.push('','='.repeat(52),`Schichten gesamt: ${totalShifts}`);
  const th=Math.floor(totalMin/60),tm=totalMin%60;
  lines.push(`Nettostunden:     ${th}h ${tm}min`,'',`Erstellt: ${new Date().toLocaleString('de-DE')}`);
  exportText=lines.join('\n');
  const ea=document.getElementById('exportArea');
  ea.textContent=exportText;ea.style.display='block';
  document.getElementById('copyBtn').style.display='block';
  showToast('Export bereit!');
}
function copyExport(){
  if(navigator.clipboard){navigator.clipboard.writeText(exportText).then(()=>showToast('Kopiert ✓'));}
  else{const ta=document.createElement('textarea');ta.value=exportText;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('Kopiert ✓');}
}

function showView(name,btn){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='stats') renderStats();
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
function init(){
  document.getElementById('topbarDate').textContent=new Date().toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
  renderCalendar();renderVorlagen();renderStats();
}
init();
</script>
