<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Schichtplaner">
<title>Schichtplaner JVA</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #171b26;
    --bg3: #1e2333;
    --border: #2a3040;
    --accent: #4a9eff;
    --accent2: #ff6b35;
    --green: #2dce89;
    --yellow: #ffc107;
    --red: #f44336;
    --purple: #9c6bff;
    --text: #e8eaf0;
    --text2: #8892a4;
    --text3: #4a5568;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    overflow-y: auto;
  }

  .topbar {
    position: sticky; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(15,17,23,0.97);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-title { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; }
  .topbar-date { font-family: var(--mono); font-size: 11px; color: var(--text2); }

  .bottom-nav {
    position: sticky; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(15,17,23,0.97);
    border-top: 1px solid var(--border);
    display: flex;
  }
  .nav-btn {
    flex: 1; padding: 10px 4px 8px;
    background: none; border: none; color: var(--text3);
    font-family: var(--sans); font-size: 10px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 20px; height: 20px; }

  .content { }
  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-month { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--text); }
  .cal-nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    width: 36px; height: 36px; border-radius: 8px; font-size: 16px;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .cal-wd { text-align: center; font-family: var(--mono); font-size: 10px; color: var(--text3); padding: 4px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; position: relative; overflow: hidden;
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .cal-day.empty { background: none; cursor: default; }
  .cal-day.today { border-color: var(--accent) !important; }
  .cal-day-num { font-family: var(--mono); font-size: 11px; font-weight: 500; z-index: 1; line-height: 1; }
  .cal-day-label { font-size: 7px; font-weight: 600; letter-spacing: 0.03em; z-index: 1; margin-top: 2px; text-transform: uppercase; }
  .cal-day-bg { position: absolute; inset: 0; }
  .cal-day.no-shift { background: var(--bg2); }
  .cal-day.no-shift .cal-day-num { color: var(--text2); }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    display: none; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 20px 20px 0 0; width: 100%; max-width: 480px;
    padding: 20px 20px 24px;
    animation: slideUp 0.25s ease;
    max-height: 90vh; overflow-y: auto;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-family: var(--mono); font-size: 14px; color: var(--accent); margin-bottom: 16px; }

  .shift-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .shift-option {
    padding: 12px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg3); cursor: pointer; transition: all 0.15s; text-align: left;
  }
  .shift-option.selected { border-color: var(--sc, var(--accent)); background: rgba(74,158,255,0.1); }
  .shift-option-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .shift-option-time { font-family: var(--mono); font-size: 10px; color: var(--text2); }
  .shift-option-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 6px; }

  .note-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-family: var(--sans); font-size: 14px;
    padding: 10px 12px; margin-bottom: 12px; resize: none; height: 60px;
  }
  .note-input:focus { outline: none; border-color: var(--accent); }

  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.75; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
  .btn-danger { background: rgba(244,67,54,0.15); color: var(--red); border: 1px solid rgba(244,67,54,0.3); }

  .section-title { font-family: var(--mono); font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .card-meta { font-family: var(--mono); font-size: 11px; color: var(--text2); }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text2); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px;
  }
  .badge { display: inline-block; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 600; font-family: var(--mono); text-transform: uppercase; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .stat-val { font-family: var(--mono); font-size: 22px; font-weight: 600; color: var(--accent); }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .export-btn {
    width: 100%; padding: 14px; background: var(--bg2); border: 1px solid var(--accent);
    border-radius: 12px; color: var(--accent); font-family: var(--mono); font-size: 13px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    margin-bottom: 10px; transition: background 0.15s;
  }
  .export-btn:active { background: rgba(74,158,255,0.1); }
  .month-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .month-row-date { font-family: var(--mono); font-size: 12px; color: var(--text2); }
  .month-row-shift { font-size: 13px; font-weight: 500; }
  .month-row-hours { font-family: var(--mono); font-size: 12px; color: var(--text2); }

  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; display: block; font-family: var(--mono); }
  .form-input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 13px;
    padding: 9px 11px;
  }
  .form-input:focus { outline: none; border-color: var(--accent); }
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
  .color-swatch.selected { border-color: white; }

  #exportArea {
    display: none;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px; margin-top: 10px; font-family: var(--mono); font-size: 11px;
    color: var(--text2); white-space: pre; overflow-x: auto; line-height: 1.6;
  }
  .copy-btn {
    width: 100%; padding: 10px; background: var(--bg3); border: 1px solid var(--green);
    border-radius: 10px; color: var(--green); font-family: var(--mono); font-size: 12px;
    cursor: pointer; margin-top: 8px; display: none;
  }

  .toast {
    position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--border); border-radius: 20px;
    padding: 8px 16px; font-size: 13px; color: var(--text); z-index: 300;
    opacity: 0; transition: opacity 0.3s; white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">⬛ Schichtplaner</div>
  <div class="topbar-date" id="topbarDate"></div>
</div>

<div class="content">
  <div class="view active" id="view-cal">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="calMonthLabel"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-weekdays">
      <div class="cal-wd">Mo</div><div class="cal-wd">Di</div><div class="cal-wd">Mi</div>
      <div class="cal-wd">Do</div><div class="cal-wd">Fr</div>
      <div class="cal-wd" style="color:var(--accent2)">Sa</div>
      <div class="cal-wd" style="color:var(--red)">So</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="view" id="view-vorlagen">
    <div class="section-title">Schichtvorlagen</div>
    <div id="vorlagenList"></div>
    <button class="export-btn" onclick="openNewVorlage()" style="border-color:var(--green);color:var(--green);margin-top:6px">
      <span>+</span> Neue Vorlage anlegen
    </button>
  </div>

  <div class="view" id="view-stats">
    <div class="cal-header" style="margin-bottom:12px">
      <button class="cal-nav-btn" onclick="changeStatsMonth(-1)">‹</button>
      <div class="cal-month" id="statsMonthLabel"></div>
      <button class="cal-nav-btn" onclick="changeStatsMonth(1)">›</button>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <button class="export-btn" onclick="exportMonth()">📄 Monatsexport anzeigen</button>
    <div id="exportArea"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyExport()">📋 Text kopieren</button>
    <div class="section-title" style="margin-top:16px">Schichten im Monat</div>
    <div id="monthList"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="showView('cal',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Kalender
  </button>
  <button class="nav-btn" onclick="showView('vorlagen',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    Vorlagen
  </button>
  <button class="nav-btn" onclick="showView('stats',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Auswertung
  </button>
</div>

<!-- MODAL: Tag -->
<div class="modal-overlay" id="dayModal" onclick="closeDayModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="dayModalTitle">Tag bearbeiten</div>
    <div class="shift-picker" id="shiftPicker"></div>
    <textarea class="note-input" id="dayNote" placeholder="Notiz (optional)…"></textarea>
    <div class="btn-row">
      <button class="btn btn-danger" onclick="clearDay()">Löschen</button>
      <button class="btn btn-secondary" onclick="closeDayModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveDay()">Speichern</button>
    </div>
  </div>
</div>

<!-- MODAL: Vorlage -->
<div class="modal-overlay" id="vorlageModal" onclick="closeVorlageModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="vorlageModalTitle">Vorlage bearbeiten</div>
    <div class="form-group">
      <label class="form-label">Bezeichnung</label>
      <input class="form-input" id="vName" placeholder="z.B. Frühdienst">
    </div>
    <div class="form-group">
      <label class="form-label">Kürzel (max 3 Zeichen)</label>
      <input class="form-input" id="vKuerzel" placeholder="z.B. FD" maxlength="3">
    </div>
    <div class="form-group">
      <label class="form-label">Beginn</label>
      <input class="form-input" type="time" id="vStart">
    </div>
    <div class="form-group">
      <label class="form-label">Ende</label>
      <input class="form-input" type="time" id="vEnd">
    </div>
    <div class="form-group">
      <label class="form-label">Pause (Minuten, 0 = keine)</label>
      <input class="form-input" type="number" id="vPause" placeholder="0" min="0" max="120">
    </div>
    <div class="form-group">
      <label class="form-label">Farbe</label>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="btn-row" style="margin-top:4px">
      <button class="btn btn-danger" id="deleteVorlageBtn" onclick="deleteVorlage()">Löschen</button>
      <button class="btn btn-secondary" onclick="closeVorlageModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveVorlage()">Speichern</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = ['#4a9eff','#ff6b35','#9c6bff','#2dce89','#ffc107','#f44336','#00bcd4','#e91e63','#8bc34a','#ff9800'];
const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

const DEFAULT_VORLAGEN = [
  { id:'F',  name:'Frühdienst',              kuerzel:'FD', start:'05:50', end:'14:20', pause:30, color:'#4a9eff' },
  { id:'F1', name:'F1',                      kuerzel:'F1', start:'05:50', end:'14:20', pause:30, color:'#4a9eff' },
  { id:'F2', name:'F2',                      kuerzel:'F2', start:'05:50', end:'14:20', pause:30, color:'#4a9eff' },
  { id:'F3', name:'F3',                      kuerzel:'F3', start:'05:50', end:'14:20', pause:30, color:'#4a9eff' },
  { id:'FZ', name:'FZ',                      kuerzel:'FZ', start:'05:50', end:'14:20', pause:30, color:'#4a9eff' },
  { id:'S',  name:'Spätdienst',              kuerzel:'SD', start:'14:10', end:'22:10', pause:0,  color:'#ff6b35' },
  { id:'N',  name:'Nachtdienst',             kuerzel:'ND', start:'22:00', end:'06:00', pause:0,  color:'#9c6bff' },
  { id:'TW', name:'Tagdienst WE/Feiertag',  kuerzel:'TW', start:'06:00', end:'18:00', pause:30, color:'#2dce89' },
  { id:'NW', name:'Nachtdienst WE/Feiertag',kuerzel:'NW', start:'18:00', end:'06:00', pause:0,  color:'#ffc107' },
];

// Use in-memory storage (localStorage not available in artifact)
let _store = {};
function lsGet(k) { return _store[k] || null; }
function lsSet(k,v) { _store[k] = v; }

function loadVorlagen() {
  const r = lsGet('vorlagen'); return r ? JSON.parse(r) : JSON.parse(JSON.stringify(DEFAULT_VORLAGEN));
}
function saveVorlagenData(v) { lsSet('vorlagen', JSON.stringify(v)); }
function loadShifts() { const r = lsGet('shifts'); return r ? JSON.parse(r) : {}; }
function saveShifts(s) { lsSet('shifts', JSON.stringify(s)); }

let vorlagen = loadVorlagen();
let shifts = loadShifts();

const TODAY = new Date(); TODAY.setHours(0,0,0,0);
let calYear = TODAY.getFullYear(), calMonth = TODAY.getMonth();
let statsYear = calYear, statsMonth = calMonth;

function dateKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const first = new Date(calYear, calMonth, 1);
  let startDow = first.getDay(); startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  for (let i = 0; i < startDow; i++) {
    const e = document.createElement('div'); e.className = 'cal-day empty'; grid.appendChild(e);
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = dateKey(calYear, calMonth, d);
    const sh = shifts[key];
    const v = sh ? vorlagen.find(x => x.id === sh.vorlageId) : null;
    const isToday = new Date(calYear, calMonth, d).getTime() === TODAY.getTime();
    const cell = document.createElement('div');
    cell.className = 'cal-day' + (v ? '' : ' no-shift') + (isToday ? ' today' : '');
    if (v) {
      cell.innerHTML = `<div class="cal-day-bg" style="background:${v.color};opacity:0.2"></div>
        <div class="cal-day-num" style="color:${v.color}">${d}</div>
        <div class="cal-day-label" style="color:${v.color}">${v.kuerzel}</div>`;
    } else {
      cell.innerHTML = `<div class="cal-day-num">${d}</div><div class="cal-day-label"></div>`;
    }
    cell.onclick = () => openDayModal(key, d);
    grid.appendChild(cell);
  }
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

let editingKey = null;

function openDayModal(key, d) {
  editingKey = key;
  const dow = new Date(calYear, calMonth, d).getDay();
  const dowNames = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  document.getElementById('dayModalTitle').textContent = `${dowNames[dow]}, ${d}. ${MONTHS[calMonth]} ${calYear}`;
  const existing = shifts[key];
  document.getElementById('dayNote').value = existing ? (existing.note || '') : '';
  const picker = document.getElementById('shiftPicker');
  picker.innerHTML = '';
  vorlagen.forEach(v => {
    const opt = document.createElement('div');
    opt.className = 'shift-option' + (existing && existing.vorlageId === v.id ? ' selected' : '');
    opt.style.setProperty('--sc', v.color);
    opt.innerHTML = `<div class="shift-option-dot" style="background:${v.color}"></div>
      <div class="shift-option-name">${v.name}</div>
      <div class="shift-option-time">${v.start}–${v.end}${v.pause ? ' | '+v.pause+'min' : ''}</div>`;
    opt.onclick = () => {
      const wasSelected = opt.classList.contains('selected');
      picker.querySelectorAll('.shift-option').forEach(o => o.classList.remove('selected'));
      if (!wasSelected) opt.classList.add('selected');
    };
    picker.appendChild(opt);
  });
  document.getElementById('dayModal').classList.add('open');
}

function closeDayModal(e) {
  if (!e || e.target === document.getElementById('dayModal'))
    document.getElementById('dayModal').classList.remove('open');
}

function saveDay() {
  const selected = document.querySelector('#shiftPicker .shift-option.selected');
  const note = document.getElementById('dayNote').value.trim();
  if (selected) {
    const idx = Array.from(document.querySelectorAll('#shiftPicker .shift-option')).indexOf(selected);
    shifts[editingKey] = { vorlageId: vorlagen[idx].id, note };
  } else if (note) {
    shifts[editingKey] = { vorlageId: null, note };
  } else {
    delete shifts[editingKey];
  }
  saveShifts(shifts);
  document.getElementById('dayModal').classList.remove('open');
  renderCalendar(); renderStats();
  showToast('Gespeichert ✓');
}

function clearDay() {
  delete shifts[editingKey];
  saveShifts(shifts);
  document.getElementById('dayModal').classList.remove('open');
  renderCalendar(); renderStats();
  showToast('Gelöscht');
}

function renderVorlagen() {
  const list = document.getElementById('vorlagenList');
  list.innerHTML = '';
  vorlagen.forEach(v => {
    const net = calcNetMinutes(v);
    const h = Math.floor(net/60), m = net%60;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-header">
      <div class="card-title">
        <span class="dot" style="background:${v.color}"></span>${v.name}
        <span class="badge" style="background:${v.color}22;color:${v.color}">${v.kuerzel}</span>
      </div>
      <div class="icon-btn" onclick="editVorlage('${v.id}')">✎</div>
    </div>
    <div class="card-meta">${v.start} – ${v.end} | Pause: ${v.pause ? v.pause+'min' : 'keine'} | Netto: ${h}h${m?' '+m+'min':''}</div>`;
    list.appendChild(card);
  });
}

function calcNetMinutes(v) {
  let [sh,sm] = v.start.split(':').map(Number);
  let [eh,em] = v.end.split(':').map(Number);
  let total = (eh*60+em) - (sh*60+sm);
  if (total < 0) total += 24*60;
  return total - (v.pause || 0);
}

let editingVorlageId = null;

function editVorlage(id) {
  const v = vorlagen.find(x => x.id === id);
  editingVorlageId = id;
  document.getElementById('vorlageModalTitle').textContent = 'Vorlage bearbeiten';
  document.getElementById('vName').value = v.name;
  document.getElementById('vKuerzel').value = v.kuerzel;
  document.getElementById('vStart').value = v.start;
  document.getElementById('vEnd').value = v.end;
  document.getElementById('vPause').value = v.pause;
  document.getElementById('deleteVorlageBtn').style.display = '';
  renderColorRow(v.color);
  document.getElementById('vorlageModal').classList.add('open');
}

function openNewVorlage() {
  editingVorlageId = null;
  document.getElementById('vorlageModalTitle').textContent = 'Neue Vorlage';
  document.getElementById('vName').value = '';
  document.getElementById('vKuerzel').value = '';
  document.getElementById('vStart').value = '06:00';
  document.getElementById('vEnd').value = '14:00';
  document.getElementById('vPause').value = '0';
  document.getElementById('deleteVorlageBtn').style.display = 'none';
  renderColorRow(COLORS[0]);
  document.getElementById('vorlageModal').classList.add('open');
}

function renderColorRow(selected) {
  const row = document.getElementById('colorRow');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === selected ? ' selected' : '');
    sw.style.background = c;
    sw.onclick = () => { row.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected')); sw.classList.add('selected'); };
    row.appendChild(sw);
  });
}

function closeVorlageModal(e) {
  if (!e || e.target === document.getElementById('vorlageModal'))
    document.getElementById('vorlageModal').classList.remove('open');
}

function saveVorlage() {
  const name = document.getElementById('vName').value.trim();
  const kuerzel = document.getElementById('vKuerzel').value.trim().toUpperCase();
  const start = document.getElementById('vStart').value;
  const end = document.getElementById('vEnd').value;
  const pause = parseInt(document.getElementById('vPause').value) || 0;
  const sel = document.querySelector('#colorRow .color-swatch.selected');
  const color = sel ? sel.style.background : COLORS[0];
  if (!name || !kuerzel || !start || !end) { showToast('Bitte alle Felder ausfüllen'); return; }
  if (editingVorlageId) {
    const idx = vorlagen.findIndex(v => v.id === editingVorlageId);
    vorlagen[idx] = { ...vorlagen[idx], name, kuerzel, start, end, pause, color };
  } else {
    vorlagen.push({ id:'V'+Date.now(), name, kuerzel, start, end, pause, color });
  }
  saveVorlagenData(vorlagen);
  document.getElementById('vorlageModal').classList.remove('open');
  renderVorlagen(); renderCalendar();
  showToast('Vorlage gespeichert ✓');
}

function deleteVorlage() {
  if (!editingVorlageId) return;
  vorlagen = vorlagen.filter(v => v.id !== editingVorlageId);
  saveVorlagenData(vorlagen);
  document.getElementById('vorlageModal').classList.remove('open');
  renderVorlagen(); renderCalendar();
  showToast('Vorlage gelöscht');
}

function changeStatsMonth(dir) {
  statsMonth += dir;
  if (statsMonth > 11) { statsMonth = 0; statsYear++; }
  if (statsMonth < 0) { statsMonth = 11; statsYear--; }
  renderStats();
}

function renderStats() {
  document.getElementById('statsMonthLabel').textContent = `${MONTHS[statsMonth]} ${statsYear}`;
  const daysInMonth = new Date(statsYear, statsMonth+1, 0).getDate();
  let totalShifts=0, totalMin=0;
  const byType={}, rows=[];
  for (let d=1; d<=daysInMonth; d++) {
    const key = dateKey(statsYear, statsMonth, d);
    const sh = shifts[key];
    if (sh && sh.vorlageId) {
      const v = vorlagen.find(x=>x.id===sh.vorlageId);
      if (v) {
        totalShifts++; const net=calcNetMinutes(v); totalMin+=net;
        byType[v.name]=(byType[v.name]||0)+1;
        rows.push({d,v,net,note:sh.note});
      }
    }
  }
  const th=Math.floor(totalMin/60), tm=totalMin%60;
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-val">${totalShifts}</div><div class="stat-label">Schichten gesamt</div></div>
    <div class="stat-card"><div class="stat-val">${th}<span style="font-size:14px">h${tm?tm+'m':''}</span></div><div class="stat-label">Nettostunden</div></div>
    ${Object.entries(byType).map(([name,cnt])=>{const v=vorlagen.find(x=>x.name===name);return`<div class="stat-card" style="border-color:${v?.color||'#fff'}44"><div class="stat-val" style="color:${v?.color||'var(--accent)'};font-size:18px">${cnt}x</div><div class="stat-label">${name}</div></div>`;}).join('')}`;
  const ml=document.getElementById('monthList');
  const dow=['So','Mo','Di','Mi','Do','Fr','Sa'];
  ml.innerHTML=rows.length===0?'<div style="color:var(--text3);font-size:13px;padding:16px 0">Keine Schichten in diesem Monat</div>':
    rows.map(r=>{const dn=dow[new Date(statsYear,statsMonth,r.d).getDay()];const h=Math.floor(r.net/60),m=r.net%60;
    return`<div class="month-row"><div class="month-row-date">${dn} ${String(r.d).padStart(2,'0')}.${String(statsMonth+1).padStart(2,'0')}.</div><div class="month-row-shift" style="color:${r.v.color}">${r.v.name}</div><div class="month-row-hours">${h}h${m?m+'m':''}</div></div>`;}).join('');
  document.getElementById('exportArea').style.display='none';
  document.getElementById('copyBtn').style.display='none';
}

let exportText = '';

function exportMonth() {
  const daysInMonth = new Date(statsYear, statsMonth+1, 0).getDate();
  const dow=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const lines=[];
  lines.push(`SCHICHTERFASSUNG ${MONTHS[statsMonth].toUpperCase()} ${statsYear}`);
  lines.push('='.repeat(44));
  lines.push('');
  let totalMin=0, totalShifts=0;
  for (let d=1;d<=daysInMonth;d++) {
    const key=dateKey(statsYear,statsMonth,d);
    const sh=shifts[key];
    const dn=dow[new Date(statsYear,statsMonth,d).getDay()];
    const ds=`${dn} ${String(d).padStart(2,'0')}.${String(statsMonth+1).padStart(2,'0')}.${statsYear}`;
    if (sh && sh.vorlageId) {
      const v=vorlagen.find(x=>x.id===sh.vorlageId);
      if (v) {
        const net=calcNetMinutes(v); totalMin+=net; totalShifts++;
        const h=Math.floor(net/60),m=net%60;
        lines.push(`${ds}  |  ${v.kuerzel.padEnd(3)}  |  ${v.start}-${v.end}  |  ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}h${sh.note?'  |  '+sh.note:''}`);
      }
    } else if (sh && sh.note) {
      lines.push(`${ds}  |  ---  |  ${sh.note}`);
    }
  }
  lines.push(''); lines.push('='.repeat(44));
  lines.push(`Schichten gesamt: ${totalShifts}`);
  const th=Math.floor(totalMin/60),tm=totalMin%60;
  lines.push(`Nettostunden:     ${th}h ${tm}min`);
  lines.push(''); lines.push(`Erstellt: ${new Date().toLocaleString('de-DE')}`);
  exportText = lines.join('\n');
  const ea = document.getElementById('exportArea');
  ea.textContent = exportText;
  ea.style.display = 'block';
  document.getElementById('copyBtn').style.display = 'block';
  showToast('Export bereit – Text kopieren!');
}

function copyExport() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(exportText).then(()=>showToast('Kopiert ✓'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = exportText; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('Kopiert ✓');
  }
}

function showView(name, btn) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  btn.classList.add('active');
  if (name==='stats') renderStats();
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function init() {
  const now=new Date();
  document.getElementById('topbarDate').textContent=now.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
  renderCalendar(); renderVorlagen(); renderStats();
}
init();
</script>
